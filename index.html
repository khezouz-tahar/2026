<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<script>

  let guess = 8;
let chiffre;

while (true) {
  chiffre = Number(prompt("Votre chiffre"));

  if (chiffre < guess) {
    console.log("Plus ⬆️");
  } else if (chiffre > guess) {
    console.log("Moins ⬇️");
  } else {
    console.log("Bravo 🎉");
    break;
  }
}
</script>



</head>
